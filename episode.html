<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting… — Civil Liberties in 60 Seconds</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="/assets/favicon.png" type="image/png" />
  <script>
    // Backward-compat: old links were episode.html?v=VIDEOID.
    // Episodes are now static pages at /episode/VIDEOID.html.
    (function () {
      var id = new URLSearchParams(location.search).get("v");
      location.replace(id ? "/episode/" + encodeURIComponent(id) + ".html" : "/index.html#archive");
    })();
  </script>
</head>
<body>
  <p style="font-family:sans-serif;padding:24px">Redirecting… <a href="/index.html">Back home</a>.</p>
</body>
</html>
